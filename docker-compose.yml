services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    environment:
      DATABASE_URL: Data Source=bookings.db
    ports:
      - "5000:5000"
    profiles:
      - debug

  web:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    profiles:
      - debug

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    network_mode: host
    volumes:
      - ./apps/frontend:/app
      - e2e_node_modules:/app/node_modules
    working_dir: /app
    environment:
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:5000
    command: >
      sh -c "npm install &&
             npx playwright install chromium &&
             timeout 90 bash -c 'until curl -sf http://localhost:5000; do echo waiting for backend...; sleep 2; done' &&
             timeout 90 bash -c 'until curl -sf http://localhost:5173; do echo waiting for web...; sleep 2; done' &&
             npx playwright test --project=chromium"
    profiles:
      - e2e

volumes:
  pgdata:
  e2e_node_modules: